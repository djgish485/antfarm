<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antfarm Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono&display=swap" rel="stylesheet">
<style>
/* ── Theme tokens ──────────────────────────────────────────────── */
:root {
  --bg-page: #FAF8F5;
  --bg-surface: #fff;
  --bg-surface-alt: #FAF8F5;
  --bg-column-header: #f5f0e8;
  --text-primary: #3A3226;
  --text-secondary: #8b8072;
  --text-tertiary: #5a5045;
  --border: #D4C4A0;
  --border-light: #eee;
  --shadow: rgba(58, 50, 38, .1);
  --shadow-heavy: rgba(58, 50, 38, .15);
  --overlay: rgba(58, 50, 38, .5);

  /* Header */
  --header-bg: #6B7F3B;
  --header-border: #5a6b32;
  --header-select-bg: #5a6b32;
  --header-select-border: #4a5a28;

  /* Accents — shared across themes */
  --accent-green: #6B7F3B;
  --accent-green-subtle: #6B7F3B22;
  --accent-teal: #3a9e8a;
  --accent-teal-subtle: #8ECFC033;
  --accent-orange: #E8845C;
  --accent-orange-subtle: #E8845C22;
  --accent-muted: #D4C4A044;
  --accent-orange-faint: #E8845C11;
  --accent-highlight: #D4E8A0;

  /* Pre/code */
  --bg-code: #FAF8F5;
}

[data-theme="dark"] {
  --bg-page: #1a1917;
  --bg-surface: #262521;
  --bg-surface-alt: #1f1e1b;
  --bg-column-header: #2a2926;
  --text-primary: #e0d8ce;
  --text-secondary: #9a9088;
  --text-tertiary: #b0a89e;
  --border: #3d3a34;
  --border-light: #333;
  --shadow: rgba(0, 0, 0, .25);
  --shadow-heavy: rgba(0, 0, 0, .4);
  --overlay: rgba(0, 0, 0, .6);

  --header-bg: #2d3320;
  --header-border: #3a4228;
  --header-select-bg: #3a4228;
  --header-select-border: #4a5438;

  --accent-green: #8fa74e;
  --accent-green-subtle: rgba(143, 167, 78, .15);
  --accent-teal: #6bc4b0;
  --accent-teal-subtle: rgba(107, 196, 176, .15);
  --accent-orange: #e8955f;
  --accent-orange-subtle: rgba(232, 149, 95, .15);
  --accent-muted: rgba(255, 255, 255, .06);
  --accent-orange-faint: rgba(232, 149, 95, .08);
  --accent-highlight: #b5cc80;

  --bg-code: #1f1e1b;
}

/* ── Auto dark mode when no explicit preference ───────────────── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-page: #1a1917;
    --bg-surface: #262521;
    --bg-surface-alt: #1f1e1b;
    --bg-column-header: #2a2926;
    --text-primary: #e0d8ce;
    --text-secondary: #9a9088;
    --text-tertiary: #b0a89e;
    --border: #3d3a34;
    --border-light: #333;
    --shadow: rgba(0, 0, 0, .25);
    --shadow-heavy: rgba(0, 0, 0, .4);
    --overlay: rgba(0, 0, 0, .6);

    --header-bg: #2d3320;
    --header-border: #3a4228;
    --header-select-bg: #3a4228;
    --header-select-border: #4a5438;

    --accent-green: #8fa74e;
    --accent-green-subtle: rgba(143, 167, 78, .15);
    --accent-teal: #6bc4b0;
    --accent-teal-subtle: rgba(107, 196, 176, .15);
    --accent-orange: #e8955f;
    --accent-orange-subtle: rgba(232, 149, 95, .15);
    --accent-muted: rgba(255, 255, 255, .06);
    --accent-orange-faint: rgba(232, 149, 95, .08);
    --accent-highlight: #b5cc80;

    --bg-code: #1f1e1b;
  }
}

/* ── Base ──────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh}
header{background:var(--header-bg);border-bottom:2px solid var(--header-border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header img{height:36px;border-radius:6px}
header h1{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:0}
header h1 span{color:var(--accent-highlight)}
select{background:var(--header-select-bg);color:#fff;border:1px solid var(--header-select-border);border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer}
select option{background:var(--header-select-bg);color:#fff}
select:focus{outline:none;border-color:#8ECFC0}

/* ── Theme toggle ─────────────────────────────────────────────── */
.theme-toggle{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;cursor:pointer;padding:5px 8px;font-size:16px;line-height:1;transition:border-color .15s}
.theme-toggle:hover{border-color:rgba(255,255,255,.5)}

/* ── Board ─────────────────────────────────────────────────────── */
.board{display:flex;gap:16px;padding:24px;overflow-x:auto;min-height:calc(100vh - 65px)}
.column{min-width:240px;flex:1;background:var(--bg-surface);border:none;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 2px 8px var(--shadow)}
.column-header{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-green);background:var(--bg-column-header);border-radius:8px 8px 0 0}
.column-header .count{background:var(--accent-green);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:8px}
.cards{padding:8px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}

/* ── Cards ─────────────────────────────────────────────────────── */
.card{background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--accent-orange);box-shadow:0 2px 8px var(--accent-orange-subtle)}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;align-items:center}
.card.done{border-left:3px solid var(--accent-green)}
.card.failed,.card.error{border-left:3px solid var(--accent-orange)}

/* ── Overlay / Panel ───────────────────────────────────────────── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:auto}
.panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 8px 32px var(--shadow-heavy)}
.panel-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.panel-close:hover{color:var(--text-primary);background:var(--bg-column-header)}
.panel h2{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:4px;padding-right:40px}
.panel-task{font-size:13px;color:var(--text-secondary);margin-bottom:16px;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto;line-height:1.5}
.panel-meta{display:flex;gap:12px;margin-bottom:20px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
.panel-meta span{display:flex;align-items:center;gap:4px}

/* ── Steps ─────────────────────────────────────────────────────── */
.steps-list{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-surface-alt);border:1px solid var(--border);border-radius:6px}
.step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.step-icon.done{background:var(--accent-green-subtle);color:var(--accent-green)}
.step-icon.running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.step-icon.pending{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.waiting{background:var(--accent-muted);color:var(--text-secondary)}
.step-icon.failed,.step-icon.error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.step-name{font-size:13px;font-weight:500;color:var(--text-primary);flex:1}
.step-agent{font-size:11px;color:var(--text-secondary);font-family:'Geist Mono',monospace}
.step-status{font-size:11px;text-transform:uppercase;font-weight:600}

/* ── Badges ────────────────────────────────────────────────────── */
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.badge-running{background:var(--accent-teal-subtle);color:var(--accent-teal)}
.badge-done,.badge-completed{background:var(--accent-green-subtle);color:var(--accent-green)}
.badge-failed,.badge-error{background:var(--accent-orange-subtle);color:var(--accent-orange)}
.badge-waiting{background:var(--accent-muted);color:var(--text-secondary)}
.badge-pending{background:var(--accent-muted);color:var(--text-secondary)}
.badge-blocked{background:var(--accent-orange-faint);color:var(--accent-orange)}

/* ── Misc ──────────────────────────────────────────────────────── */
.empty{color:var(--text-secondary);font-size:12px;text-align:center;padding:24px 8px}
.refresh-note{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
@media(max-width:768px){.board{flex-direction:column}.column{min-width:unset}}
.story-open{display:block!important}
.story-chevron-open{transform:rotate(90deg)}
.step-open{display:block!important}
.step-chevron-open{transform:rotate(90deg)}

/* ── Medic indicator ───────────────────────────────────────────── */
.medic-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;transition:border-color .15s,background .15s}
.medic-badge:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
.medic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.medic-dot.healthy{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5);animation:pulse 2s infinite}
.medic-dot.warning{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.5)}
.medic-dot.critical{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.5);animation:pulse 1s infinite}
.medic-dot.unknown{background:#9ca3af}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.medic-panel{position:fixed;top:60px;right:16px;width:340px;max-height:500px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px var(--shadow-heavy);z-index:50;overflow:hidden;display:none;flex-direction:column}
.medic-panel.open{display:flex}
.medic-panel-header{padding:14px 16px;border-bottom:1px solid var(--border-light);font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.medic-panel-body{padding:12px 16px;overflow-y:auto;flex:1}
.medic-stat{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border-light)}
.medic-stat:last-child{border-bottom:none}
.medic-stat-value{font-weight:600;color:var(--text-primary)}
.medic-check-row{padding:8px 0;border-bottom:1px solid var(--border-light);font-size:11px;line-height:1.5}
.medic-check-row:last-child{border-bottom:none}
.medic-check-time{color:var(--text-secondary);font-family:'Geist Mono',monospace}
.medic-check-summary{color:var(--text-primary);margin-left:8px}

/* ── Workers panel ────────────────────────────────────────────── */
.workers-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.85);cursor:pointer;padding:4px 10px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;transition:border-color .15s,background .15s}
.workers-badge:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
.workers-panel{position:fixed;top:60px;right:360px;width:480px;max-height:600px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px var(--shadow-heavy);z-index:50;overflow:hidden;display:none;flex-direction:column}
.workers-panel.open{display:flex}
.workers-panel-header{padding:14px 16px;border-bottom:1px solid var(--border-light);font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.workers-panel-body{padding:12px 16px;overflow-y:auto;flex:1}
.worker-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:12px}
.worker-row:last-child{border-bottom:none}
.worker-info{flex:1;display:flex;flex-direction:column;gap:2px}
.worker-pid{font-family:'Geist Mono',monospace;color:var(--accent-teal);font-size:11px}
.worker-role{font-weight:500;color:var(--text-primary)}
.worker-elapsed{color:var(--text-secondary);font-size:11px}
.worker-actions{display:flex;gap:6px}
.worker-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg-surface-alt);color:var(--text-primary);cursor:pointer;transition:border-color .15s}
.worker-btn:hover{border-color:var(--accent-orange)}
.worker-btn.kill{color:var(--accent-orange);border-color:var(--accent-orange-subtle)}
.worker-log-view{margin-top:8px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:10px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;color:var(--text-tertiary)}
</style>
</head>
<body>
<header>
  <h1><span>antfarm</span> dashboard</h1>
  <select id="wf-select"><option value="">Loading...</option></select>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">☀️</button>
  <div class="workers-badge" id="workers-badge" onclick="toggleWorkersPanel()" title="Active PTY workers">
    <span id="workers-count">Workers: 0</span>
  </div>
  <div class="medic-badge" id="medic-badge" onclick="toggleMedicPanel()" title="Medic watchdog status">
    <span class="medic-dot unknown" id="medic-dot"></span>
    <span id="medic-label">Medic</span>
  </div>
  <span class="refresh-note" id="refresh-note">Auto-refresh: 30s</span>
</header>
<div class="board" id="board"><div class="empty" style="margin:auto">Select a workflow</div></div>
<div class="workers-panel" id="workers-panel">
  <div class="workers-panel-header">PTY Workers</div>
  <div class="workers-panel-body" id="workers-panel-body">Loading...</div>
</div>
<div class="medic-panel" id="medic-panel">
  <div class="medic-panel-header">Workflow Medic</div>
  <div class="medic-panel-body" id="medic-panel-body">Loading...</div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panel"></div>
</div>

<script>
const API = '';
let workflows = [];
let currentWf = null;

async function fetchJSON(url) {
  const r = await fetch(API + url);
  return r.json();
}

async function loadWorkflows() {
  workflows = await fetchJSON('/api/workflows');
  const sel = document.getElementById('wf-select');
  sel.innerHTML = '<option value="">— select workflow —</option>' +
    workflows.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
  if (workflows.length === 1) {
    sel.value = workflows[0].id;
    selectWorkflow(workflows[0].id);
  } else if (workflows.length > 1) {
    // Auto-select workflow with active runs
    try {
      for (const w of workflows) {
        const runs = await fetchJSON(`/api/runs?workflow=${w.id}`);
        const active = runs.find(r => r.status === 'running' || r.status === 'pending');
        if (active) { sel.value = w.id; selectWorkflow(w.id); break; }
      }
    } catch {}
  }
}

function selectWorkflow(id) {
  currentWf = workflows.find(w => w.id === id) || null;
  if (currentWf) loadRuns();
  else document.getElementById('board').innerHTML = '<div class="empty" style="margin:auto">Select a workflow</div>';
}

async function loadRuns() {
  if (!currentWf) return;
  const runs = await fetchJSON(`/api/runs?workflow=${currentWf.id}`);
  renderBoard(currentWf, runs);
}

function getActiveStepId(run) {
  if (!run.steps || !run.steps.length) return null;
  const active = run.steps.find(s => s.status !== 'done' && s.status !== 'skipped');
  return active ? active.step_id : run.steps[run.steps.length - 1].step_id;
}

function renderBoard(wf, runs) {
  const board = document.getElementById('board');
  const columns = {};
  wf.steps.forEach(s => { columns[s.id] = []; });

  runs.forEach(run => {
    const stepId = getActiveStepId(run);
    const col = stepId && columns[stepId] !== undefined ? stepId : wf.steps[wf.steps.length - 1]?.id;
    if (col && columns[col]) columns[col].push(run);
  });

  board.innerHTML = wf.steps.map(step => {
    const cards = columns[step.id];
    const cardHTML = cards.length === 0
      ? '<div class="empty">No runs</div>'
      : cards.map(run => {
          const isDone = run.status === 'done';
          const isFailed = run.status === 'failed' || run.status === 'error';
          const cls = isDone ? 'done' : isFailed ? 'failed' : '';
          const badge = `badge-${run.status}`;
          const time = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
          const title = run.task.length > 60 ? run.task.slice(0, 57) + '…' : run.task;
          const runRef = run.run_number ? `#${run.run_number}` : run.id.slice(0, 8);
          const titleWithRef = `[${runRef}] ${title}`;
          return `<div class="card ${cls}" onclick="openRun('${run.id}')">
            <div class="card-title" title="${run.task.replace(/"/g, '&quot;')}">${titleWithRef}</div>
            <div class="card-meta">
              <span class="badge ${badge}">${run.status}</span>
              <span>${time}</span>
            </div>
          </div>`;
        }).join('');
    return `<div class="column">
      <div class="column-header">${step.id}<span class="count">${cards.length}</span></div>
      <div class="cards">${cardHTML}</div>
    </div>`;
  }).join('');
}

const stepIcons = {done:'✓',running:'●',pending:'○',waiting:'◌',failed:'✗',error:'✗'};
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Normalize SQLite datetime('now') format (no T/Z) to proper ISO 8601 UTC
function parseTS(ts) { if (!ts) return null; if (!ts.endsWith('Z') && !ts.includes('+')) ts = ts.replace(' ', 'T') + 'Z'; return new Date(ts); }

async function openRun(id) {
  const run = await fetchJSON(`/api/runs/${id}`);
  const panel = document.getElementById('panel');
  const created = run.created_at ? parseTS(run.created_at)?.toLocaleString() || "" : '';
  const updated = run.updated_at ? parseTS(run.updated_at)?.toLocaleString() || "" : '';
  const stepsHTML = (run.steps || []).map(s => {
    const st = s.status || 'waiting';
    const icon = stepIcons[st] || '○';
    const hasOutput = !!s.output;
    const toggleAttr = hasOutput ? `onclick="this.querySelector('.step-details').classList.toggle('step-open');this.querySelector('.step-chevron').classList.toggle('step-chevron-open')" style="cursor:pointer"` : '';
    return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
        <div class="step-icon ${st}">${icon}</div>
        <div class="step-name" style="flex:1">${s.step_id}</div>
        <div class="step-agent">${s.agent_id || ''}</div>
        <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
        ${hasOutput ? '<span class="step-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
      </div>
      ${hasOutput ? `<div class="step-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
        <details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto">${esc(s.output)}</pre></details>
      </div>` : ''}
    </div>`;
  }).join('');
  panel.innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <h2>${run.workflow_id} <span style="font-size:12px;color:var(--text-secondary);font-family:'Geist Mono',monospace">${run.run_number ? `#${run.run_number}` : run.id.slice(0,8)}</span></h2>
    <div class="panel-task">${esc(run.task)}</div>
    <div class="panel-meta">
      <span><span class="badge badge-${run.status}">${run.status}</span></span>
      <span>Created: ${created}</span>
      <span>Updated: ${updated}</span>
    </div>
    <div class="steps-list">${stepsHTML}</div>
    <div id="stories-panel"></div>
    <div id="activity-panel"></div>
  `;
  document.getElementById('overlay').classList.add('open');
  loadStories(id);
  loadActivity(id);
}

function formatEventDesc(evt) {
  const e = evt.event;
  const story = evt.storyTitle ? `${evt.storyId}: "${evt.storyTitle}"` : evt.storyId || '';
  switch (e) {
    case 'run.started': return 'Run started';
    case 'run.completed': return 'Run completed ✅';
    case 'run.failed': return 'Run failed ❌';
    case 'step.pending': return `Step pending`;
    case 'step.running': return `Claimed step`;
    case 'step.done': return `Step completed`;
    case 'step.failed': return `Step failed` + (evt.detail ? `: ${evt.detail.slice(0,80)}` : '');
    case 'step.timeout': return `Step timed out` + (evt.detail ? ` — ${evt.detail}` : '');
    case 'step.retry': return `Step retry` + (evt.detail ? ` — ${evt.detail.slice(0,80)}` : '');
    case 'story.started': return `Claimed story ${story}`;
    case 'story.done': return `Completed ${story}`;
    case 'story.verified': return `Verified ${story} ✅`;
    case 'story.retry': return `Retry ${story}` + (evt.detail ? ` — ${evt.detail.slice(0,80)}` : '');
    case 'story.failed': return `Story failed ${story}`;
    case 'pipeline.advanced': return `Pipeline advanced`;
    default: return e;
  }
}

async function loadActivity(runId) {
  const events = await fetchJSON(`/api/runs/${runId}/events`);
  const panel = document.getElementById('activity-panel');
  if (!events || events.length === 0) { panel.innerHTML = ''; return; }
  const rows = events.map(evt => {
    const t = parseTS(evt.ts);
    const time = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const agent = evt.agentId ? evt.agentId.split('/').pop() : '';
    const desc = formatEventDesc(evt);
    const agentSpan = agent
      ? `<span style="color:var(--accent-teal);font-family:'Geist Mono',monospace;flex-shrink:0">${esc(agent)}</span>`
      : '';
    return `<div style="display:flex;gap:12px;padding:4px 0;font-size:12px;line-height:1.5;border-bottom:1px solid var(--border-light)">
      <span style="color:var(--text-secondary);font-family:'Geist Mono',monospace;flex-shrink:0;min-width:44px">${time}</span>
      ${agentSpan}
      <span style="color:var(--text-primary)">${esc(desc)}</span>
    </div>`;
  }).join('');
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <h3 style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px">Activity</h3>
      <div style="max-height:300px;overflow-y:auto">${rows}</div>
    </div>
  `;
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function loadStories(runId) {
  const stories = await fetchJSON(`/api/runs/${runId}/stories`);
  const panel = document.getElementById('stories-panel');
  if (!stories || stories.length === 0) { panel.innerHTML = ''; return; }
  const done = stories.filter(s => s.status === 'done').length;
  const pct = Math.round((done / stories.length) * 100);
  panel.innerHTML = `
    <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:15px;font-weight:600;color:var(--text-primary)">Stories</h3>
        <span style="font-size:13px;font-weight:600;color:var(--accent-green)">${done} / ${stories.length} done</span>
      </div>
      <div style="background:var(--accent-muted);border-radius:4px;height:8px;margin-bottom:16px;overflow:hidden">
        <div style="background:var(--accent-green);height:100%;width:${pct}%;border-radius:4px;transition:width .3s"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${stories.map((s, i) => {
          const st = s.status || 'pending';
          const icon = stepIcons[st] || '○';
          let ac = [];
          try { ac = JSON.parse(s.acceptance_criteria || '[]'); } catch { ac = [s.acceptance_criteria]; }
          const retryInfo = s.retry_count > 0 ? ` <span style="color:var(--accent-orange);font-size:10px">(retry ${s.retry_count})</span>` : '';
          const hasDetails = s.description || ac.length > 0 || s.output;
          const toggleAttr = hasDetails ? `onclick="this.querySelector('.story-details').classList.toggle('story-open');this.querySelector('.story-chevron').classList.toggle('story-chevron-open')" style="cursor:pointer"` : '';
          return `<div class="step-row" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden" ${toggleAttr}>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px">
              <div class="step-icon ${st}">${icon}</div>
              <div class="step-name" style="flex:1">${s.story_id}: ${s.title}${retryInfo}</div>
              <div class="step-status"><span class="badge badge-${st}">${st}</span></div>
              ${hasDetails ? '<span class="story-chevron" style="color:var(--text-secondary);font-size:10px;transition:transform .15s;display:inline-block">▶</span>' : ''}
            </div>
            ${hasDetails ? `<div class="story-details" style="display:none;padding:0 12px 12px 44px;font-size:12px;color:var(--text-tertiary);line-height:1.6">
              ${s.description ? `<div style="margin-bottom:8px">${esc(s.description)}</div>` : ''}
              ${ac.length > 0 ? `<div style="margin-bottom:8px"><div style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--accent-green);margin-bottom:4px">Acceptance Criteria</div>${ac.map(c => `<label style="display:flex;align-items:flex-start;gap:6px;margin-bottom:3px;cursor:default"><span style="color:var(${st==='done'?'--accent-green':'--border'});flex-shrink:0">${st==='done'?'☑':'☐'}</span><span>${esc(c)}</span></label>`).join('')}</div>` : ''}
              ${s.output ? `<details style="margin-top:4px" onclick="event.stopPropagation()"><summary style="font-size:11px;color:var(--text-secondary);cursor:pointer;font-weight:500">Output</summary><pre style="margin-top:6px;padding:8px;background:var(--bg-code);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto">${esc(s.output)}</pre></details>` : ''}
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

document.getElementById('wf-select').addEventListener('change', e => selectWorkflow(e.target.value));
loadWorkflows();
setInterval(() => { if (currentWf) loadRuns(); }, 30000);

// ── Medic ───────────────────────────────────────────────────────
let medicPanelOpen = false;

function toggleMedicPanel() {
  medicPanelOpen = !medicPanelOpen;
  document.getElementById('medic-panel').classList.toggle('open', medicPanelOpen);
  if (medicPanelOpen) loadMedicData();
}

document.addEventListener('click', e => {
  if (!medicPanelOpen) return;
  const panel = document.getElementById('medic-panel');
  const badge = document.getElementById('medic-badge');
  if (!panel.contains(e.target) && !badge.contains(e.target)) {
    medicPanelOpen = false;
    panel.classList.remove('open');
  }
});

async function loadMedicStatus() {
  try {
    const status = await fetchJSON('/api/medic/status');
    const dot = document.getElementById('medic-dot');
    const label = document.getElementById('medic-label');

    if (!status.installed || !status.lastCheck) {
      dot.className = 'medic-dot unknown';
      label.textContent = 'Medic';
      return;
    }

    const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
    const hasIssues = status.lastCheck.issuesFound > 0;
    const isStale = ageMin > 10;

    if (hasIssues && status.lastCheck.actionsTaken < status.lastCheck.issuesFound) {
      dot.className = 'medic-dot critical';
      label.textContent = `${status.lastCheck.issuesFound} issue(s)`;
    } else if (isStale) {
      dot.className = 'medic-dot warning';
      label.textContent = `${ageMin}m ago`;
    } else if (hasIssues) {
      dot.className = 'medic-dot warning';
      label.textContent = `${status.lastCheck.issuesFound} fixed`;
    } else {
      dot.className = 'medic-dot healthy';
      label.textContent = `${ageMin}m ago`;
    }
  } catch {
    document.getElementById('medic-dot').className = 'medic-dot unknown';
    document.getElementById('medic-label').textContent = 'Medic';
  }
}

async function loadMedicData() {
  const body = document.getElementById('medic-panel-body');
  try {
    const [status, checks] = await Promise.all([
      fetchJSON('/api/medic/status'),
      fetchJSON('/api/medic/checks?limit=10'),
    ]);

    let html = '';
    html += '<div style="margin-bottom:12px">';
    if (status.lastCheck) {
      const ageMin = Math.round((Date.now() - parseTS(status.lastCheck.checkedAt).getTime()) / 60000);
      html += `<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">${ageMin}m ago</span></div>`;
      html += `<div class="medic-stat"><span>Result</span><span class="medic-stat-value">${esc(status.lastCheck.summary)}</span></div>`;
    } else {
      html += '<div class="medic-stat"><span>Last check</span><span class="medic-stat-value">Never</span></div>';
    }
    html += `<div class="medic-stat"><span>Checks (24h)</span><span class="medic-stat-value">${status.recentChecks}</span></div>`;
    html += `<div class="medic-stat"><span>Issues found (24h)</span><span class="medic-stat-value">${status.recentIssues}</span></div>`;
    html += `<div class="medic-stat"><span>Auto-fixed (24h)</span><span class="medic-stat-value">${status.recentActions}</span></div>`;
    html += '</div>';

    if (checks.length > 0) {
      html += '<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Recent Checks</div>';
      for (const c of checks) {
        const t = parseTS(c.checkedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        const icon = c.issuesFound === 0 ? '·' : c.actionsTaken > 0 ? '~' : '!';
        const color = c.issuesFound === 0 ? 'var(--text-secondary)' : c.actionsTaken >= c.issuesFound ? 'var(--accent-teal)' : 'var(--accent-orange)';
        html += `<div class="medic-check-row">
          <span class="medic-check-time">${t}</span>
          <span class="medic-check-summary" style="color:${color}">${icon} ${esc(c.summary)}</span>
        </div>`;
      }
    }

    body.innerHTML = html || '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">No medic data yet. Run <code>antfarm medic install</code> to enable.</div>';
  } catch {
    body.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">Could not load medic data.</div>';
  }
}

loadMedicStatus();
setInterval(loadMedicStatus, 30000);

// ── Workers ─────────────────────────────────────────────────────
let workersPanelOpen = false;
let workersRefreshInterval = null;

function toggleWorkersPanel() {
  workersPanelOpen = !workersPanelOpen;
  document.getElementById('workers-panel').classList.toggle('open', workersPanelOpen);
  if (workersPanelOpen) {
    loadWorkersData();
    workersRefreshInterval = setInterval(loadWorkersData, 10000);
  } else {
    if (workersRefreshInterval) { clearInterval(workersRefreshInterval); workersRefreshInterval = null; }
  }
}

document.addEventListener('click', e => {
  if (!workersPanelOpen) return;
  const panel = document.getElementById('workers-panel');
  const badge = document.getElementById('workers-badge');
  if (!panel.contains(e.target) && !badge.contains(e.target)) {
    workersPanelOpen = false;
    panel.classList.remove('open');
    if (workersRefreshInterval) { clearInterval(workersRefreshInterval); workersRefreshInterval = null; }
  }
});

async function loadWorkersCount() {
  try {
    const workers = await fetchJSON('/api/workers');
    document.getElementById('workers-count').textContent = `Workers: ${workers.length}`;
  } catch {
    document.getElementById('workers-count').textContent = 'Workers: ?';
  }
}

async function loadWorkersData() {
  const body = document.getElementById('workers-panel-body');
  try {
    const workers = await fetchJSON('/api/workers');
    document.getElementById('workers-count').textContent = `Workers: ${workers.length}`;
    if (workers.length === 0) {
      body.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">No active workers.</div>';
      return;
    }
    body.innerHTML = workers.map(w => {
      const elapsed = Math.round(w.elapsedMs / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      return `<div class="worker-row">
        <div class="worker-info">
          <div class="worker-role">${esc(w.agentRole)}</div>
          <div class="worker-pid">PID ${w.pid} &middot; step ${w.stepId.slice(0,8)} &middot; run ${w.runId.slice(0,8)}</div>
          <div class="worker-elapsed">${mins}m ${secs}s elapsed</div>
        </div>
        <div class="worker-actions">
          <button class="worker-btn" onclick="event.stopPropagation();viewWorkerLog('${w.stepId}')">Log</button>
          <button class="worker-btn kill" onclick="event.stopPropagation();killWorker('${w.stepId}')">Kill</button>
        </div>
      </div>`;
    }).join('');
  } catch {
    body.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0">Could not load workers.</div>';
  }
}

async function viewWorkerLog(stepId) {
  const body = document.getElementById('workers-panel-body');
  try {
    const data = await fetchJSON(`/api/workers/${stepId}/log`);
    body.innerHTML = `<div>
      <button class="worker-btn" onclick="loadWorkersData()" style="margin-bottom:8px">&larr; Back</button>
      <div class="worker-log-view">${esc(data.log || '(empty)')}</div>
    </div>`;
  } catch {
    body.innerHTML += '<div style="color:var(--accent-orange);font-size:11px;margin-top:8px">Failed to load log.</div>';
  }
}

async function killWorker(stepId) {
  if (!confirm('Kill this worker?')) return;
  try {
    await fetch(`/api/workers/${stepId}/kill`, { method: 'POST' });
    loadWorkersData();
  } catch {
    alert('Failed to kill worker.');
  }
}

loadWorkersCount();
setInterval(loadWorkersCount, 10000);

// ── Theme toggle ──────────────────────────────────────────────────
(function initTheme() {
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const STORAGE_KEY = 'antfarm-theme';

  function getEffectiveTheme() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }

  applyTheme(getEffectiveTheme());

  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') || getEffectiveTheme();
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
  });

  // Update if system preference changes and no manual override
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!localStorage.getItem(STORAGE_KEY)) applyTheme(getEffectiveTheme());
  });
})();
</script>
