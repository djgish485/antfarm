id: research-fast
name: Fast Research
version: 2
description: |
  Lightweight research pipeline. Research step investigates and synthesizes.
  Verify step independently checks completeness and consistency.

polling:
  model: sonnet
  timeoutSeconds: 120

cron:
  interval_ms: 20000

execution:
  mode: pty
  workerTimeoutMinutes: 30

agents:
  - id: rfresearch
    name: Researcher
    role: analysis
    description: Investigates the task, collects evidence, and synthesizes findings into conclusions.
    workspace:
      baseDir: agents/researcher
      files:
        AGENTS.md: agents/researcher/AGENTS.md
        SOUL.md: agents/researcher/SOUL.md
        IDENTITY.md: agents/researcher/IDENTITY.md

  - id: rfverify
    name: Verifier
    role: verification
    description: Independently checks research output for completeness and consistency.
    workspace:
      baseDir: agents/verifier
      files:
        AGENTS.md: agents/verifier/AGENTS.md
        SOUL.md: agents/verifier/SOUL.md
        IDENTITY.md: agents/verifier/IDENTITY.md

steps:
  - id: research
    agent: rfresearch
    input: |
      Research this task thoroughly: investigate, collect evidence, and synthesize into conclusions.

      TASK:
      {{task}}

      Instructions:
      1. Investigate directly in the target repo/system as requested.
      2. Use concrete evidence (commands, logs, code references). Do not invent data.
      3. After collecting findings, synthesize them into clear conclusions.
      4. Separate confirmed facts from assumptions.
      5. Produce actionable recommendations.

      Reply with:
      STATUS: done
      FINDINGS:
      - bullet findings with evidence
      SUMMARY: concise synthesis of what was found
      RECOMMENDATIONS:
      - ordered action bullets
      RISKS:
      - optional bullets (or "none")
      ASSUMPTIONS:
      - optional bullets (or "none")
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: rfverify
    input: |
      Verify completeness and consistency of this research output. You did NOT do the research.

      TASK:
      {{task}}

      SUMMARY:
      {{summary}}

      RECOMMENDATIONS:
      {{recommendations}}

      ASSUMPTIONS:
      {{assumptions}}

      Instructions:
      1. Confirm all required fields are present and non-empty.
      2. Confirm recommendations align with the summary and findings.
      3. Flag contradictions, missing critical details, or unsupported claims.
      4. If the research is incomplete, specify exactly what's missing.

      Reply with (if complete):
      STATUS: done
      VERIFIED: what was checked and final verdict

      Or if issues found:
      STATUS: retry
      ISSUES:
      - what needs to be re-researched or corrected
    expects: "STATUS: done"
    on_fail:
      retry_step: research
      max_retries: 2
      on_exhausted:
        escalate_to: human
