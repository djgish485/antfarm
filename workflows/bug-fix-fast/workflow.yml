id: bug-fix-fast
name: Fast Build/Test Fix
version: 7
description: |
  Fast path for straightforward build/test/lint/typecheck breakages.
  Three-step pipeline: Fix (setup + implement + test), Verify (independent check + browser smoke),
  Deploy (merge to main + deploy + live smoke).
  Uses isolated run worktrees for /opt/the-algo and a serialized merge queue to main.

polling:
  model: anthropic/claude-sonnet-4-20250514
  timeoutSeconds: 120

cron:
  interval_ms: 60000

execution:
  mode: pty
  workerTimeoutMinutes: 30

agents:
  - id: fixer
    name: Fixer
    role: coding
    description: Sets up the environment, implements the fix, builds, tests, and pushes.
    workspace:
      baseDir: agents/fixer
      files:
        AGENTS.md: agents/fixer/AGENTS.md
        SOUL.md: agents/fixer/SOUL.md
        IDENTITY.md: agents/fixer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Independently confirms the fix via build, test, diff review, and browser smoke.
    workspace:
      baseDir: agents/verifier
      skills:
        - agent-browser
      files:
        AGENTS.md: ../../agents/shared/verifier/AGENTS.md
        SOUL.md: ../../agents/shared/verifier/SOUL.md
        IDENTITY.md: ../../agents/shared/verifier/IDENTITY.md

steps:
  - id: fix
    agent: fixer
    input: |
      Implement a minimal fix for this failure. You handle everything: setup, coding, testing, commit, push.

      BUG / FAILURE REPORT:
      {{task}}

      VERIFY FEEDBACK (if retrying after failed verification):
      {{verify_feedback}}

      Instructions:

      PHASE 1 — SETUP:
      1. Determine the target repo path from the task. If not explicit, use /opt/the-algo.
      2. Resolve an isolated run workspace:
         - If REPO is /opt/the-algo, set RUN_REPO=/root/.openclaw/workspaces/workflows/bug-fix-fast/runs/{{run_id}}/the-algo
         - Set RUN_BRANCH=bug-fix-fast-{{run_id}}
         - Ensure /opt/the-algo is fetched (`git -C /opt/the-algo fetch origin --prune`)
         - Create or reuse isolated worktree at RUN_REPO and branch RUN_BRANCH from origin/main
         - Use RUN_REPO as REPO and RUN_BRANCH as BRANCH for the rest
      3. For non-/opt/the-algo repos, use the repo and current branch unless task says otherwise.
      4. cd into REPO, ensure correct branch.
      5. Detect build/test commands from package scripts.

      PHASE 2 — FIX:
      6. Implement the smallest fix that resolves the reported failure.
      7. Add or update a focused regression test where applicable.
      8. Run build and test commands. Fix any issues your changes introduced.
      9. If unrelated blockers exist, note them but still complete the fix.

      PHASE 3 — SHIP:
      10. Commit with: fix: resolve <short failure summary>
      11. Push the branch to origin.

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: branch-name
      BUILD_CMD: build command used
      TEST_CMD: test command used
      CHANGES: concise summary of code changes
      TESTS: what was run and result
      COMMIT_SHA: full commit SHA
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Independently verify this bugfix is correct and complete. You did NOT write this code.

      BUG / FAILURE REPORT:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      COMMIT_SHA: {{commit_sha}}

      DO NOT read the fixer's change summary. Instead:

      Instructions:

      PHASE 1 — CODE REVIEW:
      1. cd into {{repo}} and checkout {{branch}}.
      2. Run: git show --stat {{commit_sha}} and git show {{commit_sha}}
      3. Read the diff yourself. Reject if the commit is empty or unrelated to the reported failure.
      4. Check for obvious issues: missing edge cases, broken imports, style violations.

      PHASE 2 — BUILD & TEST:
      5. Run the build command. It must pass.
      6. Run the test command. All tests must pass.
      7. Confirm the failure described in the bug report is actually addressed by the changes.

      PHASE 3 — BROWSER SMOKE (if applicable):
      8. If the fix changes frontend/UI behavior, run a LOCAL browser smoke test:
         - Use puppeteer-core (devDependency in repo) + chromium at /snap/bin/chromium
         - Test against http://127.0.0.1:3000 (NOT the public URL which requires Cloudflare auth)
         - Write a small node script: launch headless chromium with --no-sandbox, navigate, wait for hydration
         - Verify the specific UI behavior mentioned in the bug report works correctly
         - Check for JS console errors
      9. If chromium or puppeteer-core is unavailable, skip browser test with a note.

      Reply with (if everything passes):
      STATUS: done
      VERIFIED: what was verified (diff review, build, tests, browser smoke)

      Or if issues found:
      STATUS: retry
      ISSUES:
      - what is missing or wrong (be specific so the fixer can act on it)
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: deploy
    agent: fixer
    input: |
      Merge to main, deploy, and verify the live site. One continuous operation.

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      COMMIT_SHA: {{commit_sha}}

      Instructions:

      PHASE 1 — MERGE TO MAIN:
      1. Serialize merges using file lock at /root/.openclaw/antfarm/locks/merge-main.lock (wait up to 30 min).
      2. Inside the lock:
         - QUEUE_REPO=/root/.openclaw/workspaces/workflows/feature-dev/merge-queue/the-algo
         - If QUEUE_REPO does not exist, clone /opt/the-algo into QUEUE_REPO
         - git -C QUEUE_REPO fetch origin --prune
         - git -C QUEUE_REPO checkout main && git -C QUEUE_REPO reset --hard origin/main
         - Verify origin/{{branch}} exists
         - git -C QUEUE_REPO merge --no-ff --no-edit origin/{{branch}}
         - Run tests and build in QUEUE_REPO
         - git -C QUEUE_REPO push origin main
         - Capture MAIN_COMMIT via git -C QUEUE_REPO rev-parse HEAD
      3. If merge conflicts or test failures: abort, reset to origin/main, return STATUS: retry.

      PHASE 2 — DEPLOY:
      4. Run:
         python3 /root/.openclaw/workspace/antfarm/scripts/deploy-live.py \
           --repo /opt/the-algo \
           --remote origin \
           --branch main \
           --service the-algo \
           --expected-sha <MAIN_COMMIT> \
           --origin-url http://127.0.0.1:3000 \
           --json-out /tmp/antfarm-deploy-live-{{run_id}}.json
      5. If deploy fails, return STATUS: retry with details.

      PHASE 3 — LIVE SMOKE:
      6. Run:
         python3 /root/.openclaw/workspace/antfarm/scripts/live-smoke.py \
           --public-url https://algo2.dangish.net \
           --origin-url http://127.0.0.1:3000 \
           --json-out /tmp/antfarm-live-smoke-{{run_id}}.json
      7. If smoke fails, return STATUS: retry with details.

      Reply with:
      STATUS: done
      MAIN_COMMIT: <full sha on origin/main>
      MERGED_BRANCH: {{branch}}
      DEPLOY_RESULT: success
      SMOKE_RESULT: pass

      Or if any phase fails:
      STATUS: retry
      PHASE_FAILED: merge|deploy|smoke
      ISSUES: <what went wrong>
    expects: "STATUS: done"
    on_fail:
      escalate_to: human
