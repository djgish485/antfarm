id: security-audit
name: Security Audit
version: 2
description: |
  Security audit pipeline. Scan identifies vulnerabilities and prioritizes them.
  Fix implements remediations. Verify independently confirms fixes pass.

polling:
  model: sonnet
  timeoutSeconds: 120

execution:
  mode: pty
  workerTimeoutMinutes: 30

agents:
  - id: scanner
    name: Scanner
    role: analysis
    description: Scans for vulnerabilities and prioritizes findings.
    workspace:
      baseDir: agents/scanner
      files:
        AGENTS.md: agents/scanner/AGENTS.md
        SOUL.md: agents/scanner/SOUL.md
        IDENTITY.md: agents/scanner/IDENTITY.md

  - id: fixer
    name: Fixer
    role: coding
    description: Sets up environment and implements security remediations.
    workspace:
      baseDir: agents/fixer
      files:
        AGENTS.md: agents/fixer/AGENTS.md
        SOUL.md: agents/fixer/SOUL.md
        IDENTITY.md: agents/fixer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Independently verifies security fixes and runs tests.
    workspace:
      baseDir: agents/verifier
      files:
        AGENTS.md: ../../agents/shared/verifier/AGENTS.md
        SOUL.md: ../../agents/shared/verifier/SOUL.md
        IDENTITY.md: ../../agents/shared/verifier/IDENTITY.md

steps:
  - id: scan
    agent: scanner
    input: |
      Scan for security vulnerabilities and prioritize findings.

      TASK:
      {{task}}

      Instructions:
      1. Determine repo path from task (default /opt/the-algo).
      2. Run security scanning tools: npm audit, dependency checks, code pattern analysis.
      3. Check for common vulnerabilities: exposed secrets, injection risks, auth bypasses, XSS, CSRF.
      4. Review .env handling, API key management, authentication flows.
      5. Prioritize findings by severity (critical/high/medium/low).
      6. For each finding, include: location, severity, description, recommended fix.

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      FINDINGS:
      - severity: critical|high|medium|low
        location: file:line
        description: what's wrong
        recommendation: how to fix
      SCAN_SUMMARY: overview of security posture
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: fix
    agent: fixer
    input: |
      Implement security remediations. You handle setup, coding, and testing.

      TASK:
      {{task}}

      REPO: {{repo}}
      FINDINGS:
      {{findings}}

      SCAN_SUMMARY: {{scan_summary}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback}}

      Instructions:

      PHASE 1 — SETUP:
      1. cd into repo. For /opt/the-algo: read .antfarm-target-branch, stay on that branch.
      2. Ensure .gitignore includes .env, node_modules/, *.key, *.pem.
      3. Establish baseline: run build and tests.

      PHASE 2 — FIX:
      4. Address findings in priority order (critical first).
      5. For each fix: minimal change, add test where applicable.
      6. Run build and tests after each fix.
      7. Commit each fix separately: fix(security): description

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: branch-name
      BUILD_CMD: build command
      TEST_CMD: test command
      CHANGES: summary of remediations applied
      TESTS: what was run and result
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Independently verify the security remediations. You did NOT write this code.

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      TEST_CMD: {{test_cmd}}
      FINDINGS:
      {{findings}}

      Instructions:
      1. Review git log and diffs for the security commits.
      2. For each original finding: confirm the fix addresses the vulnerability.
      3. Run the full test suite — all tests must pass.
      4. Check that fixes don't introduce new security issues.
      5. Verify no secrets were accidentally committed.
      6. Run npm audit to confirm dependency issues resolved (if applicable).

      Reply with (if everything passes):
      STATUS: done
      VERIFIED: what was confirmed, which findings are resolved

      Or if issues found:
      STATUS: retry
      ISSUES:
      - what's wrong or still vulnerable
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 2
      on_exhausted:
        escalate_to: human
