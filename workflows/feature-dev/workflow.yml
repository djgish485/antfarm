id: feature-dev
name: Feature Development
version: 9
description: |
  Feature development pipeline. Plan decomposes into stories.
  Implement loops through stories with per-story verification.
  Test runs integration/E2E. Deploy merges to main, deploys, and smoke tests.

polling:
  model: sonnet
  timeoutSeconds: 120

cron:
  interval_ms: 60000

execution:
  mode: pty
  workerTimeoutMinutes: 30

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories.
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements stories, writes tests, commits.
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Independently verifies each story and runs integration tests.
    workspace:
      baseDir: agents/verifier
      skills:
        - agent-browser
      files:
        AGENTS.md: ../../agents/shared/verifier/AGENTS.md
        SOUL.md: ../../agents/shared/verifier/SOUL.md
        IDENTITY.md: ../../agents/shared/verifier/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      Decompose this task into user stories AND set up the development environment.

      TASK:
      {{task}}

      Instructions:

      PHASE 1 — EXPLORE & PLAN:
      1. Explore the codebase to understand stack, conventions, and patterns.
      2. Break the task into small user stories (max 20).
      3. Order by dependency: schema/DB first, backend, frontend, integration.
      4. Each story must fit in one developer session.
      5. Every acceptance criterion must be mechanically verifiable.
      6. Every story MUST include test criteria and "Typecheck passes."

      PHASE 2 — SETUP:
      7. Determine REPO path from task (default /opt/the-algo).
      8. For /opt/the-algo: BRANCH MUST be main.
      9. Resolve isolated run workspace:
         - RUN_REPO=/root/.openclaw/workspaces/workflows/feature-dev/runs/{{run_id}}/the-algo
         - RUN_BRANCH=feature-dev-{{run_id}}
         - Fetch origin, create worktree at RUN_REPO branched from origin/main
      10. Ensure .gitignore exists (must include .env, node_modules/, *.key, *.pem).
      11. Run build and tests to establish baseline.

      Reply with:
      STATUS: done
      REPO: <resolved run workspace path>
      BRANCH: <resolved branch name>
      BUILD_CMD: <build command>
      TEST_CMD: <test command>
      BASELINE: <baseline status>
      STORIES_JSON: [ ... array of story objects ... ]
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: implement
    agent: developer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
    input: |
      Implement this ONE user story in a fresh session.

      TASK (overall):
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      COMPLETED STORIES:
      {{completed_stories}}

      STORIES REMAINING: {{stories_remaining}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Normalize: if REPO is /opt/the-algo or missing, use /root/.openclaw/workspaces/workflows/feature-dev/runs/{{run_id}}/the-algo
      2. cd into REPO, checkout BRANCH, pull if upstream exists.
      3. Read progress-{{run_id}}.txt for patterns and context.
      4. Implement this story only. Write tests for it.
      5. Run build and test commands.
      6. Commit: feat: {{current_story_id}} - {{current_story_title}}
      7. Update progress-{{run_id}}.txt.

      Reply with:
      STATUS: done
      CHANGES: what you implemented
      TESTS: what tests you wrote
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Verify the developer's work on this story. You did NOT write this code.

      TASK (overall):
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Normalize: if REPO is /opt/the-algo or missing, use /root/.openclaw/workspaces/workflows/feature-dev/runs/{{run_id}}/the-algo
      2. Check that code exists (not just TODOs or placeholders).
      3. Verify each acceptance criterion for this story.
      4. Confirm tests exist for this story's functionality.
      5. Run {{test_cmd}} — all tests must pass.
      6. Run typecheck.
      7. If frontend changes: do a quick browser smoke via puppeteer-core + /snap/bin/chromium against http://127.0.0.1:3000 if possible. Skip if unavailable.

      Reply with:
      STATUS: done
      VERIFIED: what was confirmed

      Or if issues found:
      STATUS: retry
      ISSUES:
      - what's missing or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: deploy
    agent: developer
    input: |
      Push, merge to main, deploy, and verify. One continuous operation.

      TASK:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      Instructions:

      PHASE 1 — PUSH:
      1. Normalize: if REPO is /opt/the-algo or missing, use /root/.openclaw/workspaces/workflows/feature-dev/runs/{{run_id}}/the-algo
      2. cd into REPO, ensure all changes committed, push branch to origin.

      PHASE 2 — MERGE TO MAIN:
      3. Use file lock at /root/.openclaw/antfarm/locks/merge-main.lock (wait up to 30 min).
      4. Inside lock:
         - QUEUE_REPO=/root/.openclaw/workspaces/workflows/feature-dev/merge-queue/the-algo
         - If QUEUE_REPO doesn't exist, clone /opt/the-algo
         - Fetch, reset to origin/main
         - Merge origin/feature-dev-{{run_id}} --no-ff
         - Run tests and build in QUEUE_REPO
         - Push to origin main
         - Capture MAIN_COMMIT SHA
      5. If conflicts or test failures: abort, reset, return STATUS: retry.

      PHASE 3 — DEPLOY:
      6. Run deploy-live.py with --expected-sha <MAIN_COMMIT> --origin-url http://127.0.0.1:3000
      7. If deploy fails, return STATUS: retry.

      PHASE 4 — SMOKE:
      8. Run live-smoke.py with --public-url https://algo2.dangish.net --origin-url http://127.0.0.1:3000
      9. If available, also run a browser smoke: puppeteer-core + /snap/bin/chromium against http://127.0.0.1:3000
         - Confirm feed renders, click one item, verify no "Application error"
      10. If smoke fails, return STATUS: retry.

      Reply with:
      STATUS: done
      MAIN_COMMIT: <full sha>
      DEPLOY_RESULT: success
      SMOKE_RESULT: pass

      Or if any phase fails:
      STATUS: retry
      PHASE_FAILED: push|merge|deploy|smoke
      ISSUES: <what went wrong>
    expects: "STATUS: done"
    on_fail:
      escalate_to: human
