# Deep bug-fix pipeline — for complex bugs requiring triage and investigation
id: bug-fix
name: Bug Triage & Fix
version: 2
description: |
  Deep bug fix pipeline for complex issues. Investigate step does triage + root cause + setup + fix.
  Verify step independently confirms correctness. PR step creates the pull request.

polling:
  model: anthropic/claude-sonnet-4-20250514
  timeoutSeconds: 120

execution:
  mode: pty
  workerTimeoutMinutes: 30

agents:
  - id: fixer
    name: Fixer
    role: coding
    description: Triages the bug, investigates root cause, sets up environment, implements fix, and tests.
    workspace:
      baseDir: agents/fixer
      files:
        AGENTS.md: agents/fixer/AGENTS.md
        SOUL.md: agents/fixer/SOUL.md
        IDENTITY.md: agents/fixer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Independently verifies the fix, regression test, and code quality.
    workspace:
      baseDir: agents/verifier
      files:
        AGENTS.md: ../../agents/shared/verifier/AGENTS.md
        SOUL.md: ../../agents/shared/verifier/SOUL.md
        IDENTITY.md: ../../agents/shared/verifier/IDENTITY.md

  - id: pr
    name: PR Creator
    role: pr
    description: Creates a pull request with complete bug fix details.
    workspace:
      baseDir: agents/pr
      files:
        AGENTS.md: ../../agents/shared/pr/AGENTS.md
        SOUL.md: ../../agents/shared/pr/SOUL.md
        IDENTITY.md: ../../agents/shared/pr/IDENTITY.md

steps:
  - id: fix
    agent: fixer
    input: |
      Investigate and fix this bug. You handle everything: triage, root cause analysis, setup, coding, testing.

      BUG REPORT:
      {{task}}

      VERIFY FEEDBACK (if retrying after failed verification):
      {{verify_feedback}}

      Instructions:

      PHASE 1 — TRIAGE:
      1. Read the bug report carefully.
      2. Explore the codebase to find the affected area.
      3. Attempt to reproduce: run tests, check failing cases, read error logs/stack traces.
      4. Classify severity (critical/high/medium/low).

      PHASE 2 — INVESTIGATE:
      5. Trace the bug to its root cause. Document exactly what's wrong and why.
      6. Determine the fix approach.

      PHASE 3 — SETUP:
      7. Determine repo path from task (default /opt/the-algo).
      8. For /opt/the-algo: read .antfarm-target-branch, stay on that branch.
      9. For other repos: create a bugfix branch from main.
      10. Ensure .gitignore exists (must include .env, node_modules/, *.key, *.pem).

      PHASE 4 — FIX:
      11. Implement the minimal fix that addresses the root cause.
      12. Write a regression test that would have caught this bug.
      13. Run build and test commands. Fix any issues your changes introduced.
      14. Commit with: fix: brief description

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: branch-name
      SEVERITY: critical|high|medium|low
      ROOT_CAUSE: detailed explanation
      CHANGES: what was changed
      REGRESSION_TEST: what test was added
      BUILD_CMD: build command
      TEST_CMD: test command
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Independently verify this bug fix. You did NOT write this code.

      BUG REPORT:
      {{task}}

      REPO: {{repo}}
      BRANCH: {{branch}}
      TEST_CMD: {{test_cmd}}
      ROOT_CAUSE: {{root_cause}}

      DO NOT trust the fixer's change summary. Review the code yourself.

      Instructions:
      1. Run `git diff main..{{branch}} --stat` and `git diff main..{{branch}}`.
      2. If diff is empty or trivial (version bumps, lockfiles), REJECT immediately.
      3. Review the fix: does it address the root cause, not just a symptom?
      4. Check the regression test: does it test the specific bug scenario?
      5. Run the full test suite. All tests must pass.
      6. Check for unintended side effects, broken imports, style violations.
      7. The fix should be minimal and targeted — not a refactor disguised as a bugfix.

      Reply with (if everything passes):
      STATUS: done
      VERIFIED: what was confirmed

      Or if issues found:
      STATUS: retry
      ISSUES:
      - what's wrong (be specific so the fixer can act on it)
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 3
      on_exhausted:
        escalate_to: human

  - id: pr
    agent: pr
    input: |
      Create a pull request for this verified bug fix.

      REPO: {{repo}}
      BRANCH: {{branch}}
      SEVERITY: {{severity}}
      ROOT_CAUSE: {{root_cause}}
      CHANGES: {{changes}}
      REGRESSION_TEST: {{regression_test}}
      VERIFIED: {{verified}}

      PR title format: fix: brief description of what was fixed

      PR body:
      ## Bug Description
      (derive from task)

      **Severity:** {{severity}}

      ## Root Cause
      {{root_cause}}

      ## Fix
      {{changes}}

      ## Regression Test
      {{regression_test}}

      ## Verification
      {{verified}}

      Use: gh pr create

      Reply with:
      STATUS: done
      PR: URL to the pull request
    expects: "STATUS: done"
    on_fail:
      escalate_to: human
